name: 'Rootstock Foundry Deployer'
description: 'Automated Foundry deployments pre-configured for Rootstock Mainnet (Chain 30) & Testnet (Chain 31). No more --legacy errors.'
author: 'Rootstock (RSK)'

branding:
  icon: 'zap'
  color: 'orange'

# ─────────────────────────────────────────────
#  INPUTS
# ─────────────────────────────────────────────
inputs:
  rpc_url:
    description: |
      Rootstock RPC endpoint URL.
      Mainnet: https://public-node.rsk.co
      Testnet: https://public-node.testnet.rsk.co
    required: true

  private_key:
    description: |
      Private key of the deployer account (with RBTC for gas).
      Always reference via secrets: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
    required: true

  script_path:
    description: |
      Path to the Foundry deploy script relative to the repo root.
      Example: script/Deploy.s.sol
    required: true

  contract_name:
    description: |
      Name of the primary contract to verify on Blockscout.
      Example: MyToken
      Leave blank to skip targeted verification (full script verification still runs).
    required: false
    default: ''

  verifier_type:
    description: |
      Verification provider. Default is 'blockscout' (Rootstock Explorer).
      Override to 'etherscan' only if you are using a custom Etherscan-compatible endpoint.
    required: false
    default: 'blockscout'

  gas_estimate_multiplier:
    description: |
      Percentage multiplier applied to Foundry's gas estimate.
      Default 130 adds a 30% buffer — recommended for Rootstock to avoid out-of-gas CI failures.
    required: false
    default: '130'

  min_balance:
    description: |
      Minimum deployer account balance required before deployment (in wei).
      Default: 100000000000000 (0.0001 RBTC).
      Fail-fast guard: emits a human-readable error instead of a cryptic RPC error.
    required: false
    default: '100000000000000'

  extra_args:
    description: |
      Additional flags to pass directly to `forge script`.
      Tokens are safely tokenized (word-split via read -ra) and validated
      against a metacharacter blocklist to prevent injection attacks (H-2).
      Example: --slow --skip-simulation
    required: false
    default: ''

  strict_gas_check:
    description: |
      When set to 'true', the action will FAIL (exit 1) if the current network
      gas price is below the Rootstock minimum (60 Mwei). By default the action
      warns but continues, which is permissive for testnet use.
      Set to 'true' for production / Mainnet deployments (L-1).
    required: false
    default: 'false'

  etherscan_api_key:
    description: |
      API key for Etherscan-compatible verification endpoints.
      REQUIRED when verifier_type is set to 'etherscan'.
      Ignored (and not passed to forge) when verifier_type is 'blockscout' (L-2).
      Always reference via secrets: ${{ secrets.ETHERSCAN_API_KEY }}
    required: false
    default: ''

# ─────────────────────────────────────────────
#  OUTPUTS
# ─────────────────────────────────────────────
outputs:
  contract_address:
    description: 'Address of the first deployed contract, parsed from the Foundry broadcast log.'

  transaction_hash:
    description: 'Transaction hash of the deployment broadcast.'

  chain_id:
    description: 'Chain ID used for deployment (30 = Mainnet, 31 = Testnet).'

  explorer_url:
    description: 'Direct Blockscout Explorer URL to the deployed contract.'

# ─────────────────────────────────────────────
#  RUNTIME — Docker
# ─────────────────────────────────────────────
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_RPC_URL: ${{ inputs.rpc_url }}
    INPUT_PRIVATE_KEY: ${{ inputs.private_key }}
    INPUT_SCRIPT_PATH: ${{ inputs.script_path }}
    INPUT_CONTRACT_NAME: ${{ inputs.contract_name }}
    INPUT_VERIFIER_TYPE: ${{ inputs.verifier_type }}
    INPUT_GAS_ESTIMATE_MULTIPLIER: ${{ inputs.gas_estimate_multiplier }}
    INPUT_MIN_BALANCE: ${{ inputs.min_balance }}
    INPUT_EXTRA_ARGS: ${{ inputs.extra_args }}
    INPUT_STRICT_GAS_CHECK: ${{ inputs.strict_gas_check }}
    INPUT_ETHERSCAN_API_KEY: ${{ inputs.etherscan_api_key }}
